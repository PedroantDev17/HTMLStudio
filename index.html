<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/Login.css">
    <link rel="shortcut icon" href="favicon_io/favicon.ico" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    
    <div id="container">
        
        <img src="imagens/image-removebg-Logo.png" alt="Logo">

        <div class="login">
            <p><label for="iemail">Email:</label></p>
            <p><input type="email" name="email" id="iemail" placeholder="Email"></p>

            <p><label for="isenha">Senha:</label></p>
            <p><input type="password" name="senha" id="isenha" placeholder="Sua senha"></p>
            <br>
            <input type="submit" value="Entrar">
        </div>
    </div>
</body>
</html>
