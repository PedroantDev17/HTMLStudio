<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/Login.css">
    <link rel="shortcut icon" href="favicon_io/favicon.ico" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    
    <div id="container">
        
        <img src="imagens/image-removebg-Logo.png" alt="Logo">

        <div  class="login">
            <form action="HTML Studio ©.html" autocomplete="off" method="post">
                <p><label for="iemail">Email:</label></p>
                <p><input type="email" name="email" id="iemail" placeholder="Email" required autocapitalize="email"></p>
                <p><label for="isenha">Senha:</label></p>
                <p><input type="password" name="senha" id="isenha" placeholder="Sua senha" required autocapitalize="password" minlength="5"></p>
                <br>
                <input type="submit" value="Entrar" id="ienviar" onclick="return enviar()">
            </form>  
        </div>
    </div>

    <script>
        function enviar() {
        let gmail= document.getElementById('iemail')
        let senha = document.getElementById('isenha')

        let Email = gmail.value
        let Senha = senha.value
        
            if (Email.length < 5 || Senha.length < 5) {
                window.alert('Cadastro errados!, tente novamente')
                return false;
            }else if(Email.length > 50) {
                window.alert('Seu email passou de 50 caracteres!')
                return false;
            } 
            else if (!/[a-zA-Z]/,/[0-9]/.test(Email)){
                window.alert('Acrescente mais caracteres no Email')
                return false;
           }else if (!Email.includes('@')){
            window.alert('Acrescente @ no email!')
                return false;
           }
            else if (!/[a-zA-Z]/.test(Senha) || !/[0-9]/.test(Senha)){
                window.alert('A senha deve conter letras e números!')
                return false;
            }else{
                
            }
            return true;
        } 
        
    </script>
</body>
</html>
